<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景圆形渐变 -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF"/>
      <stop offset="100%" style="stop-color:#5AC8FA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#007AFF" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect x="5" y="5" width="90" height="90" rx="22" ry="22" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- 聊天气泡图标 -->
  <g transform="translate(50, 50)">
    <!-- 主气泡 -->
    <path d="M-22 -18 C-22 -22, -18 -26, -14 -26 L14 -26 C18 -26, 22 -22, 22 -18 L22 10 C22 14, 18 18, 14 18 L-8 18 L-16 26 L-16 18 L-14 18 C-18 18, -22 14, -22 10 Z" 
          fill="white" 
          opacity="0.95"/>
    
    <!-- 装饰线条 - 模拟文字 -->
    <rect x="-14" y="-18" width="20" height="3" rx="1.5" fill="#007AFF" opacity="0.6"/>
    <rect x="-14" y="-11" width="28" height="3" rx="1.5" fill="#007AFF" opacity="0.6"/>
    <rect x="-14" y="-4" width="24" height="3" rx="1.5" fill="#007AFF" opacity="0.6"/>
    <rect x="-14" y="3" width="16" height="3" rx="1.5" fill="#007AFF" opacity="0.6"/>
  </g>
  
  <!-- 顶部高光效果 -->
  <rect x="5" y="5" width="90" height="45" rx="22" ry="22" fill="white" opacity="0.15" clip-path="inset(0 0 50% 0 round 22px)"/>
</svg>
